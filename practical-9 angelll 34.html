<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Nights | UI Showcase</title>
    <link rel="stylesheet" href="https://cloudflare.com">
    <style>
        /* 1. Global Setup & Modern Fonts */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: radial-gradient(circle at center, #1a1a2e 0%, #0f0f1b 100%);
            color: #fff; font-family: 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            overflow-x: hidden;
        }

        /* 2. Animated Header */
        header { 
            text-align: center; padding: 80px 20px; 
            animation: slideIn 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }
        header h1 { 
            font-size: 4rem; letter-spacing: 5px; text-transform: uppercase;
            background: linear-gradient(to right, #00f2fe, #4facfe, #7b61ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(79, 172, 254, 0.5));
        }

        /* 3. Responsive Grid & Glassmorphism */
        main { 
            display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 30px; width: 90%; max-width: 1200px; padding-bottom: 80px;
        }

        .card { 
            position: relative; background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(15px); border-radius: 24px; padding: 50px 30px;
            border: 1px solid rgba(255, 255, 255, 0.1); text-align: center;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden; cursor: pointer;
        }

        /* 4. Transformations & Hover Glow */
        .card:hover { 
            transform: translateY(-20px) scale(1.02) rotateX(10deg);
            background: rgba(255, 255, 255, 0.08);
            border-color: #00f2fe;
            box-shadow: 0 25px 50px -12px rgba(0, 242, 254, 0.3);
        }

        .card i { 
            font-size: 3.5rem; margin-bottom: 25px; 
            background: linear-gradient(45deg, #00f2fe, #7b61ff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            transition: transform 0.5s ease;
        }
        .card:hover i { transform: scale(1.2) rotate(10deg); }

        .card h3 { font-size: 1.8rem; margin-bottom: 15px; color: #4facfe; }
        .card p { color: #a0a0c0; line-height: 1.6; }

        /* 5. Keyframe Animations */
        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(-50px); filter: blur(10px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        /* Shimmer Effect overlay */
        .card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }
        .card:hover::before { left: 100%; }
    </style>
</head>
<body>

    <header>
        <h1>NEON DRIVE</h1>
        <p>The Future of Immersive Web Interface</p>
    </header>

    <main>
        <div class="card">
            <i class="fas fa-satellite-dish"></i>
            <h3>Network</h3>
            <p>High-speed data streaming with ultra-low latency protocols.</p>
        </div>

        <div class="card">
            <i class="fas fa-shield-halved"></i>
            <h3>Secure</h3>
            <p>Quantum-grade encryption for the modern digital landscape.</p>
        </div>

        <div class="card">
            <i class="fas fa-brain"></i>
            <h3>Neural</h3>
            <p>Adaptive AI interfaces that learn your browsing habits.</p>
        </div>
    </main>

</body>
</html>
